<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graduation Project Pitch — Team Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B0E1A;
    --surface:#131A2E;
    --surface-2:#1B2340;
    --violet:#6C5CE7;
    --violet-soft:#9B8CFF;
    --cyan:#45E0D6;
    --coral:#FF6B5B;
    --paper:#F5F6FA;
    --paper-dim:#B8BEDA;
    --line:rgba(245,246,250,0.12);
    --display: 'Space Grotesk', sans-serif;
    --body: 'Inter', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:var(--ink);color:var(--paper);font-family:var(--body);overflow:hidden;}
  @media (prefers-reduced-motion: reduce){ *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;} }

  #deck{position:relative;width:100vw;height:100vh;}
  .slide{
    position:absolute; inset:0;
    display:flex; flex-direction:column; justify-content:center;
    padding: 6vh 8vw;
    opacity:0; pointer-events:none;
    transform: translateY(18px);
    transition: opacity .5s ease, transform .5s ease;
  }
  .slide.active{opacity:1; pointer-events:auto; transform:translateY(0);}

  .eyebrow{
    font-family:var(--mono); font-size:.78rem; letter-spacing:.14em; text-transform:uppercase;
    color:var(--cyan); margin-bottom:1.1rem; display:flex; align-items:center; gap:.6rem;
  }
  .eyebrow::before{content:'';width:22px;height:1px;background:var(--cyan);display:inline-block;}

  h1{
    font-family:var(--display); font-weight:700; line-height:1.02;
    font-size:clamp(2.4rem, 5.2vw, 4.6rem); letter-spacing:-0.02em;
  }
  h2{
    font-family:var(--display); font-weight:600; line-height:1.05;
    font-size:clamp(1.8rem, 3.4vw, 3rem); letter-spacing:-0.01em; margin-bottom:.4rem;
  }
  .lede{font-size:clamp(1rem,1.3vw,1.25rem); color:var(--paper-dim); max-width:60ch; margin-top:1.2rem; line-height:1.55;}
  .accent{color:var(--violet-soft);}
  .accent-c{color:var(--cyan);}
  .accent-r{color:var(--coral);}

  /* progress + nav */
  #hud{position:fixed; bottom:28px; left:0; right:0; display:flex; align-items:center; justify-content:center; gap:10px; z-index:50;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--line); transition:.3s;}
  .dot.on{background:var(--cyan); width:22px; border-radius:4px;}
  #idx{position:fixed; top:28px; right:8vw; font-family:var(--mono); font-size:.78rem; color:var(--paper-dim); letter-spacing:.08em; z-index:50;}
  .navbtn{
    position:fixed; top:50%; transform:translateY(-50%); z-index:50;
    width:44px;height:44px;border-radius:50%; border:1px solid var(--line); background:rgba(255,255,255,0.02);
    color:var(--paper); font-family:var(--mono); font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:.2s;
  }
  .navbtn:hover{border-color:var(--cyan); color:var(--cyan);}
  .navbtn:focus-visible{outline:2px solid var(--cyan); outline-offset:2px;}
  #prev{left:28px;} #next{right:28px;}
  .navbtn.hidden{opacity:0; pointer-events:none;}

  /* signature: pipeline / build strip */
  .pipeline{display:flex; gap:0; margin-top:2.4rem; max-width:900px;}
  .pipe-node{flex:1; position:relative; padding:1.3rem 1.4rem 1.3rem 0; border-top:2px solid var(--line);}
  .pipe-node:first-child{border-top-color:var(--cyan);}
  .pipe-node::before{
    content:''; position:absolute; top:-6px; left:0; width:11px; height:11px; border-radius:50%;
    background:var(--ink); border:2px solid var(--line);
  }
  .pipe-node:first-child::before{border-color:var(--cyan); background:var(--cyan);}
  .pipe-tag{font-family:var(--mono); font-size:.72rem; letter-spacing:.1em; color:var(--paper-dim); text-transform:uppercase;}
  .pipe-title{font-family:var(--display); font-weight:600; font-size:1.15rem; margin:.35rem 0 .4rem;}
  .pipe-desc{font-size:.88rem; color:var(--paper-dim); line-height:1.5;}

  /* team grid */
  .grid-team{display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line); margin-top:2.4rem; max-width:920px; border:1px solid var(--line);}
  .member{background:var(--ink); padding:1.5rem 1.4rem;}
  .m-name{font-family:var(--display); font-weight:600; font-size:1.05rem;}
  .m-major{display:inline-block; margin-top:.6rem; font-family:var(--mono); font-size:.7rem; letter-spacing:.08em; text-transform:uppercase; padding:.28rem .6rem; border-radius:3px;}
  .tag-cs{color:var(--cyan); border:1px solid rgba(69,224,214,.35); background:rgba(69,224,214,.06);}
  .tag-cyber{color:var(--coral); border:1px solid rgba(255,107,91,.35); background:rgba(255,107,91,.06);}
  .tag-se{color:var(--violet-soft); border:1px solid rgba(155,140,255,.35); background:rgba(155,140,255,.06);}

  /* sponsor table */
  .table-wrap{margin-top:2.2rem; max-width:900px; border:1px solid var(--line);}
  .trow{display:grid; grid-template-columns:1.1fr 1.4fr 1.4fr; border-top:1px solid var(--line);}
  .trow:first-child{border-top:none;}
  .trow.head .tcell{font-family:var(--mono); font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:var(--paper-dim);}
  .tcell{padding:1rem 1.3rem; font-size:.92rem; display:flex; align-items:center;}
  .co-name{font-family:var(--display); font-weight:600; font-size:1.02rem;}
  .badge{font-family:var(--mono); font-size:.65rem; letter-spacing:.06em; padding:.15rem .5rem; border-radius:3px; margin-left:.6rem; text-transform:uppercase;}
  .badge-select{color:var(--coral); border:1px solid rgba(255,107,91,.4);}
  .badge-open{color:var(--cyan); border:1px solid rgba(69,224,214,.35);}

  /* plan cards */
  .plans{display:grid; grid-template-columns:repeat(3,1fr); gap:1.1rem; margin-top:2.2rem; max-width:980px;}
  .plan-card{border:1px solid var(--line); padding:1.5rem 1.4rem; background:linear-gradient(180deg, rgba(255,255,255,.02), transparent);}
  .plan-card.primary{border-color:rgba(69,224,214,.4);}
  .plan-tag{font-family:var(--mono); font-size:.72rem; color:var(--paper-dim); letter-spacing:.1em;}
  .plan-card.primary .plan-tag{color:var(--cyan);}
  .plan-name{font-family:var(--display); font-weight:700; font-size:1.5rem; margin:.3rem 0 .8rem;}
  .plan-body{font-size:.88rem; color:var(--paper-dim); line-height:1.6;}

  .divider{width:100%; height:1px; background:var(--line); margin:2.2rem 0 1.6rem;}
  .const-box{border:1px solid rgba(255,107,91,.35); background:rgba(255,107,91,.05); padding:1.6rem 1.8rem; max-width:760px; margin-top:1rem;}
  .const-label{font-family:var(--mono); font-size:.7rem; letter-spacing:.1em; color:var(--coral); text-transform:uppercase; margin-bottom:.5rem;}

  .timeline{margin-top:2.4rem; max-width:820px;}
  .t-item{display:grid; grid-template-columns:120px 1fr; gap:1.5rem; padding:1rem 0; border-top:1px solid var(--line);}
  .t-item:first-child{border-top:none;}
  .t-date{font-family:var(--mono); font-size:.82rem; color:var(--cyan);}
  .t-what{font-size:.92rem; color:var(--paper-dim);}

  .ask-grid{display:grid; grid-template-columns:1fr 1fr; gap:2rem; margin-top:2.2rem; max-width:900px;}
  .ask-item{border-left:2px solid var(--violet); padding-left:1.2rem;}
  .ask-item h3{font-family:var(--display); font-size:1.05rem; margin-bottom:.4rem;}
  .ask-item p{font-size:.86rem; color:var(--paper-dim); line-height:1.55;}

  .placeholder{color:var(--paper-dim); font-style:italic;}
  .kicker-num{font-family:var(--mono); color:var(--paper-dim); font-size:.85rem;}

  @media (max-width: 720px){
    .grid-team{grid-template-columns:1fr 1fr;}
    .plans{grid-template-columns:1fr;}
    .trow{grid-template-columns:1fr;}
    .ask-grid{grid-template-columns:1fr;}
    .pipeline{flex-direction:column; gap:1rem;}
  }
</style>
</head>
<body>

<div id="deck"></div>

<button class="navbtn" id="prev" aria-label="Previous slide">&#8592;</button>
<button class="navbtn" id="next" aria-label="Next slide">&#8594;</button>
<div id="hud"></div>
<div id="idx"></div>

<script>
const slides = [

// 1 — Hero
`<div class="eyebrow">Graduation Project Pitch</div>
<h1>Six students.<br><span class="accent-c">One</span> project<br>fully planned<span class="accent">.</span></h1>
<p class="lede">A walkthrough of our team, our sponsorship options, and the plan we've built for each possible path — Plan A, B, and C.</p>`,

// 2 — Team intro
`<div class="eyebrow">01 — The Team</div>
<h2>Who's building this</h2>
<p class="lede">Three disciplines, one team — enough range to cover engineering, security, and process.</p>
<div class="grid-team">
  <div class="member"><div class="m-name">Ahmed Morsy</div><span class="m-major tag-cs">Computer Science</span></div>
  <div class="member"><div class="m-name">Omar Hossam</div><span class="m-major tag-cs">Computer Science</span></div>
  <div class="member"><div class="m-name">Abdullah Ashraf</div><span class="m-major tag-cs">Computer Science</span></div>
  <div class="member"><div class="m-name">Ahmed Ehab</div><span class="m-major tag-cyber">Cybersecurity</span></div>
  <div class="member"><div class="m-name">Mark Hany</div><span class="m-major tag-cyber">Cybersecurity</span></div>
  <div class="member"><div class="m-name">Mahmoud Samer</div><span class="m-major tag-se">Software Engineering</span></div>
</div>`,

// 3 — Why him
`<div class="eyebrow">02 — Academic Supervision</div>
<h2>Working with <span class="accent-c">Dr. Mahmoud Shawky</span></h2>
<p class="lede placeholder">[Add 2–3 lines here: his relevant expertise, courses he's taught you, or past graduation projects he's supervised.]</p>
<div class="divider"></div>
<p class="lede">Whichever company ends up sponsoring the technical side, the academic backbone — research rigor, methodology, and the final paper — stays under his supervision.</p>`,

// 4 — Sponsorship landscape
`<div class="eyebrow">03 — Sponsorship Landscape</div>
<h2>Who could fund this</h2>
<p class="lede">One path hands us the idea. The rest ask us to bring our own.</p>
<div class="table-wrap">
  <div class="trow head">
    <div class="tcell">Company</div>
    <div class="tcell">What they give</div>
    <div class="tcell">What's needed from us</div>
  </div>
  <div class="trow">
    <div class="tcell"><span class="co-name">Siemens</span><span class="badge badge-select">Selection process</span></div>
    <div class="tcell">Full project idea + full technical support</div>
    <div class="tcell">Pass their team interview</div>
  </div>
  <div class="trow">
    <div class="tcell"><span class="co-name">Ejada</span><span class="badge badge-open">Open</span></div>
    <div class="tcell">Sponsorship</div>
    <div class="tcell">We bring our own idea</div>
  </div>
  <div class="trow">
    <div class="tcell"><span class="co-name">RAYA Tech</span><span class="badge badge-open">Open</span></div>
    <div class="tcell">Sponsorship</div>
    <div class="tcell">We bring our own idea</div>
  </div>
  <div class="trow">
    <div class="tcell"><span class="co-name">Microsoft</span><span class="badge badge-open">Open</span></div>
    <div class="tcell">Sponsorship</div>
    <div class="tcell">We bring our own idea</div>
  </div>
  <div class="trow">
    <div class="tcell"><span class="co-name">Synapse</span><span class="badge badge-open">Possible</span></div>
    <div class="tcell">Sponsorship</div>
    <div class="tcell">We bring our own idea</div>
  </div>
</div>`,

// 5 — Plans A/B/C
`<div class="eyebrow">04 — Our Plan</div>
<h2>Three paths, one outcome</h2>
<p class="lede">We're not betting everything on one company saying yes.</p>
<div class="plans">
  <div class="plan-card primary">
    <div class="plan-tag">Plan A — Preferred</div>
    <div class="plan-name">Siemens Track</div>
    <div class="plan-body">Pass the Siemens interviews as a team. If accepted, we get the project idea and full technical support — working under Siemens as industry mentor and Dr. Shawky as academic supervisor.</div>
  </div>
  <div class="plan-card">
    <div class="plan-tag">Plan B — Fallback</div>
    <div class="plan-name">Own Idea + Sponsor</div>
    <div class="plan-body">We brainstorm an original idea and pitch it for sponsorship from Ejada, RAYA Tech, Microsoft, or Synapse.</div>
  </div>
  <div class="plan-card">
    <div class="plan-tag">Plan C — Backup</div>
    <div class="plan-name">Independent</div>
    <div class="plan-body">If no sponsorship comes through, we execute our own idea independently, self-directed and self-resourced.</div>
  </div>
</div>`,

// 6 — Constant thread
`<div class="eyebrow">05 — What Doesn't Change</div>
<h2>One constant across every path</h2>
<div class="pipeline">
  <div class="pipe-node"><div class="pipe-tag">Plan A</div><div class="pipe-title">Siemens</div><div class="pipe-desc">Idea + full support</div></div>
  <div class="pipe-node"><div class="pipe-tag">Plan B</div><div class="pipe-title">Own idea</div><div class="pipe-desc">Sponsor from Ejada / RAYA / Microsoft / Synapse</div></div>
  <div class="pipe-node"><div class="pipe-tag">Plan C</div><div class="pipe-title">Independent</div><div class="pipe-desc">Self-driven execution</div></div>
</div>
<div class="const-box">
  <div class="const-label">Constant</div>
  <div style="font-family:var(--display); font-weight:600; font-size:1.15rem;">A full research paper on the project, under Dr. Mahmoud Shawky's supervision — regardless of which plan we end up on.</div>
</div>`,

// 7 — Timeline
`<div class="eyebrow">06 — Timeline</div>
<h2>Where each milestone lands</h2>
<div class="timeline">
  <div class="t-item"><div class="t-date placeholder">[date]</div><div class="t-what">Siemens interview / selection round</div></div>
  <div class="t-item"><div class="t-date placeholder">[date]</div><div class="t-what">Decision deadline — fall back to Plan B if not selected</div></div>
  <div class="t-item"><div class="t-date placeholder">[date]</div><div class="t-what">Own-idea brainstorm finalized (Plan B trigger point)</div></div>
  <div class="t-item"><div class="t-date placeholder">[date]</div><div class="t-what">Sponsor outreach to Ejada / RAYA / Microsoft / Synapse</div></div>
  <div class="t-item"><div class="t-date placeholder">[date]</div><div class="t-what">Research paper milestones begin under supervision</div></div>
</div>`,

// 8 — Next Steps
`<div class="eyebrow">07 — Next Steps</div>
<h2>Where this stands</h2>
<div class="ask-grid">
  <div class="ask-item">
    <h3>Supervision</h3>
    <p>Academic supervision covers the technical direction and the research paper, across all three plans.</p>
  </div>
  <div class="ask-item">
    <h3>Decision window</h3>
    <p class="placeholder">[Date] — Plan B moves forward in time if Siemens doesn't come through.</p>
  </div>
  <div class="ask-item">
    <h3>Direction flexibility</h3>
    <p>The exact project may shift depending on which plan we land on — the plan itself doesn't.</p>
  </div>
  <div class="ask-item">
    <h3>Contact</h3>
    <p class="placeholder">[Team email / phone]</p>
  </div>
</div>
<div class="divider"></div>
<p class="lede">Happy to answer any questions.</p>`
];

const deck = document.getElementById('deck');
const hud = document.getElementById('hud');
const idxEl = document.getElementById('idx');
let current = 0;

slides.forEach((html, i) => {
  const s = document.createElement('div');
  s.className = 'slide';
  s.innerHTML = html;
  deck.appendChild(s);
  const d = document.createElement('div');
  d.className = 'dot';
  d.setAttribute('role','button');
  d.setAttribute('tabindex','0');
  d.addEventListener('click', () => go(i));
  hud.appendChild(d);
});

const slideEls = document.querySelectorAll('.slide');
const dotEls = document.querySelectorAll('.dot');

function go(i){
  if(i < 0 || i >= slides.length) return;
  slideEls[current].classList.remove('active');
  dotEls[current].classList.remove('on');
  current = i;
  slideEls[current].classList.add('active');
  dotEls[current].classList.add('on');
  idxEl.textContent = String(current+1).padStart(2,'0') + ' / ' + String(slides.length).padStart(2,'0');
  document.getElementById('prev').classList.toggle('hidden', current === 0);
  document.getElementById('next').classList.toggle('hidden', current === slides.length - 1);
}

document.getElementById('prev').addEventListener('click', () => go(current - 1));
document.getElementById('next').addEventListener('click', () => go(current + 1));
document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowRight' || e.key === ' ') go(current + 1);
  if(e.key === 'ArrowLeft') go(current - 1);
});

go(0);
</script>
</body>
</html>
