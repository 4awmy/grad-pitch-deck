<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── DESIGN TOKENS ─── */
:root {
  --navy:   #0F2351;
  --blue:   #2563EB;
  --teal:   #0891B2;
  --coral:  #E55B4D;
  --green:  #059669;
  --white:  #FFFFFF;
  --bg:     #F8FAFC;
  --text:   #0F172A;
  --mid:    #475569;
  --muted:  #94A3B8;
  --border: #E2E8F0;
  --panel-w: 26%;
  --display: 'Plus Jakarta Sans', sans-serif;
  --body:    'Inter', sans-serif;
  --mono:    'DM Mono', monospace;
}

/* ─── RESET ─── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: var(--navy); }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; } }

/* ─── DECK SHELL ─── */
#deck-shell {
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
  font-family: var(--body);
  color: var(--text);
  overflow: hidden;
  position: relative;
}

/* ─── SLIDE ─── */
.slide {
  position: absolute; inset: 0;
  display: flex;
  opacity: 0; pointer-events: none;
  transform: translateY(14px);
  transition: opacity 0.45s ease, transform 0.45s ease;
}
.slide.active { opacity: 1; pointer-events: auto; transform: translateY(0); }

/* ─── LEFT PANEL ─── */
.left-panel {
  width: var(--panel-w);
  min-width: 180px;
  background: var(--navy);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 3.5vh 2.2vw 3.5vh 2.8vw;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.left-panel::after {
  content: '';
  position: absolute;
  right: 0; top: 10%; bottom: 10%;
  width: 1px;
  background: rgba(255,255,255,0.08);
}
.panel-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  line-height: 1.6;
}
.panel-label span {
  display: block;
  color: rgba(255,255,255,0.7);
  font-size: 0.7rem;
  margin-top: 0.5rem;
}
.ghost-num {
  font-family: var(--display);
  font-size: clamp(5rem, 10vw, 9rem);
  font-weight: 800;
  color: rgba(255,255,255,0.04);
  line-height: 1;
  user-select: none;
  letter-spacing: -0.04em;
}

/* ─── RIGHT PANEL ─── */
.right-panel {
  flex: 1;
  background: var(--white);
  padding: 4.5vh 5vw 4.5vh 4.5vw;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 0;
}

/* ─── HERO SLIDE (full navy) ─── */
.slide.hero-slide { background: var(--navy); }
.slide.hero-slide .left-panel { border-right: none; }
.slide.hero-slide .left-panel::after { display: none; }
.slide.hero-slide .right-panel {
  background: var(--navy);
  justify-content: center;
  align-items: flex-start;
}

/* ─── TYPOGRAPHY ─── */
.eyebrow {
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.eyebrow::before { content: ''; width: 20px; height: 1px; background: var(--blue); display: inline-block; }

h1, h2 { font-family: var(--display); }
h1 {
  font-size: clamp(2rem, 4vw, 3.8rem);
  font-weight: 800;
  line-height: 1.04;
  letter-spacing: -0.025em;
  color: var(--white);
}
h2 {
  font-size: clamp(1.6rem, 2.8vw, 2.8rem);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 0.5rem;
}
.lede {
  font-size: clamp(0.88rem, 1.1vw, 1.05rem);
  color: var(--mid);
  line-height: 1.65;
  max-width: 58ch;
  margin-top: 0.9rem;
}
.lede.white { color: rgba(255,255,255,0.65); }
.placeholder { color: var(--muted); font-style: italic; }

/* ─── HERO PILLS ─── */
.hero-pills { display: flex; gap: 0.6rem; margin-top: 1.8rem; flex-wrap: wrap; }
.hero-pill {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.35rem 0.8rem;
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.55);
  border-radius: 3px;
}

/* ─── DIVIDER ─── */
.divider { width: 100%; height: 1px; background: var(--border); margin: 1.6rem 0; }

/* ─── AGENDA ─── */
.agenda-list { margin-top: 1.4rem; display: flex; flex-direction: column; gap: 0; }
.agenda-item {
  display: grid;
  grid-template-columns: 2.5rem 1fr;
  gap: 0.8rem;
  align-items: start;
  padding: 0.9rem 0;
  border-top: 1px solid var(--border);
}
.agenda-item:first-child { border-top: none; }
.agenda-num { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); padding-top: 0.18rem; }
.agenda-text h3 { font-family: var(--display); font-size: 1rem; font-weight: 600; color: var(--text); }
.agenda-text p { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; line-height: 1.4; }

/* ─── TEAM GRID ─── */
.team-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-top: 1.4rem;
  max-width: 900px;
}
.member-card {
  background: var(--white);
  padding: 1.1rem 1rem;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 0.6rem;
}
.member-avatar {
  width: 52px; height: 52px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border);
  background: var(--bg);
}
.member-name { font-family: var(--display); font-size: 0.9rem; font-weight: 700; color: var(--text); }
.member-role { font-size: 0.72rem; color: var(--mid); line-height: 1.4; }
.member-links { display: flex; gap: 0.5rem; margin-top: 0.2rem; align-items: center; }
.member-links a {
  display: flex; align-items: center;
  font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.08em;
  text-decoration: none; color: var(--muted);
  border: 1px solid var(--border); border-radius: 3px;
  padding: 0.18rem 0.45rem;
  transition: color 0.2s, border-color 0.2s;
}
.member-links a:hover { color: var(--blue); border-color: var(--blue); }
.badge {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.2rem 0.5rem;
  border-radius: 3px;
  border: 1px solid;
}
.badge-cs    { color: var(--teal);  border-color: rgba(8,145,178,0.3);  background: rgba(8,145,178,0.06); }
.badge-cyber { color: var(--coral); border-color: rgba(229,91,77,0.3);  background: rgba(229,91,77,0.06); }
.badge-se    { color: var(--blue);  border-color: rgba(37,99,235,0.3);  background: rgba(37,99,235,0.06); }
.badge-highlight {
  background: rgba(37,99,235,0.08);
  border: 1px solid rgba(37,99,235,0.2);
  border-radius: 3px;
  padding: 0.2rem 0.4rem;
  font-size: 0.58rem;
  font-family: var(--mono);
  color: var(--blue);
  letter-spacing: 0.06em;
}

/* ─── SUPERVISION SLIDE ─── */
.supervision-layout {
  display: grid;
  grid-template-columns: 160px 1fr;
  gap: 2rem;
  align-items: start;
  margin-top: 1.2rem;
  max-width: 780px;
}
.supervision-photo {
  width: 140px; height: 140px;
  border-radius: 8px;
  object-fit: cover;
  border: 2px solid var(--border);
}
.supervision-asks {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-top: 1.2rem;
  max-width: 780px;
}
.ask-col { padding: 1rem 1.2rem; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); }
.ask-col h4 { font-family: var(--display); font-size: 0.8rem; font-weight: 700; color: var(--text); margin-bottom: 0.6rem; }
.ask-col ul { list-style: none; display: flex; flex-direction: column; gap: 0.35rem; }
.ask-col ul li { font-size: 0.78rem; color: var(--mid); padding-left: 0.8rem; position: relative; }
.ask-col ul li::before { content: '—'; position: absolute; left: 0; color: var(--muted); }

/* ─── SPONSOR TABLE ─── */
.sponsor-table { margin-top: 1.4rem; max-width: 860px; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.s-row { display: grid; grid-template-columns: 1.2fr 1.5fr 1.5fr; border-bottom: 1px solid var(--border); }
.s-row:last-child { border-bottom: none; }
.s-row.head .s-cell { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); background: var(--bg); }
.s-row.highlight { background: rgba(37,99,235,0.03); }
.s-cell { padding: 0.8rem 1rem; font-size: 0.82rem; display: flex; align-items: center; gap: 0.5rem; }
.co-name { font-family: var(--display); font-weight: 600; font-size: 0.88rem; }
.s-badge { font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.06em; padding: 0.15rem 0.45rem; border-radius: 3px; border: 1px solid; }
.s-badge.plan-a { color: var(--blue); border-color: rgba(37,99,235,0.4); }
.s-badge.open   { color: var(--teal); border-color: rgba(8,145,178,0.35); }
.s-badge.maybe  { color: var(--muted); border-color: var(--border); }

/* ─── PLAN CARDS ─── */
.plans { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 1.4rem; max-width: 960px; }
.plan-card { border: 1px solid var(--border); padding: 1.2rem 1.2rem; border-radius: 4px; background: var(--bg); }
.plan-card.primary { border-color: var(--blue); background: rgba(37,99,235,0.04); }
.plan-tag { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.plan-card.primary .plan-tag { color: var(--blue); }
.plan-name { font-family: var(--display); font-weight: 700; font-size: 1.2rem; color: var(--text); margin: 0.35rem 0 0.7rem; }
.plan-body { font-size: 0.8rem; color: var(--mid); line-height: 1.6; }
.const-box {
  border-left: 3px solid var(--coral);
  background: rgba(229,91,77,0.04);
  padding: 1rem 1.2rem;
  max-width: 960px;
  margin-top: 1rem;
  border-radius: 0 4px 4px 0;
}
.const-label { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--coral); margin-bottom: 0.4rem; }
.const-body { font-family: var(--display); font-size: 0.92rem; font-weight: 600; color: var(--text); }

/* ─── IDEAS BENTO ─── */
.ideas-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto auto;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-top: 1.4rem;
  max-width: 860px;
}
.idea-card {
  background: var(--white);
  padding: 1.1rem;
  display: flex;
  flex-direction: column;
  gap: 0.45rem;
  cursor: pointer;
  transition: background 0.2s;
  position: relative;
}
.idea-card:hover { background: var(--bg); }
.idea-card.wide { grid-column: 1 / -1; }
.idea-tag {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.18rem 0.5rem;
  border-radius: 3px;
  border: 1px solid;
  width: fit-content;
}
.tag-ai    { color: var(--teal);  border-color: rgba(8,145,178,0.35);  background: rgba(8,145,178,0.06); }
.tag-hw    { color: var(--coral); border-color: rgba(229,91,77,0.35);  background: rgba(229,91,77,0.06); }
.tag-med   { color: var(--green); border-color: rgba(5,150,105,0.35);  background: rgba(5,150,105,0.06); }
.idea-title { font-family: var(--display); font-size: 0.95rem; font-weight: 700; color: var(--text); }
.idea-desc  { font-size: 0.76rem; color: var(--mid); line-height: 1.5; }
.idea-explore {
  margin-top: auto;
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  color: var(--blue);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  transition: gap 0.2s;
  padding-top: 0.5rem;
  background: none;
  border: none;
  cursor: pointer;
}
.idea-card:hover .idea-explore { gap: 0.55rem; }

/* ─── TIMELINE ─── */
.timeline { margin-top: 1.4rem; max-width: 780px; }
.t-row { display: grid; grid-template-columns: 110px 1fr; gap: 1.2rem; padding: 0.8rem 0; border-top: 1px solid var(--border); align-items: start; }
.t-row:first-child { border-top: none; }
.t-date { font-family: var(--mono); font-size: 0.72rem; color: var(--blue); padding-top: 0.1rem; }
.t-label { font-size: 0.84rem; color: var(--mid); line-height: 1.5; }

/* ─── ASK GRID ─── */
.ask-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.4rem 2rem; margin-top: 1.4rem; max-width: 860px; }
.ask-item { border-left: 2px solid var(--blue); padding-left: 1rem; }
.ask-item h3 { font-family: var(--display); font-size: 0.95rem; font-weight: 700; margin-bottom: 0.35rem; }
.ask-item p  { font-size: 0.8rem; color: var(--mid); line-height: 1.55; }

/* ─── MODAL OVERLAY ─── */
#modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(15,35,81,0.6);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s ease;
}
#modal-overlay.open { opacity: 1; pointer-events: auto; }
#modal-box {
  background: var(--white);
  width: min(92vw, 860px);
  max-height: 88vh;
  border-radius: 6px;
  overflow-y: auto;
  transform: translateY(20px);
  transition: transform 0.35s ease;
  box-shadow: 0 24px 80px rgba(0,0,0,0.25);
}
#modal-overlay.open #modal-box { transform: translateY(0); }

.modal-header {
  background: var(--navy);
  padding: 1.2rem 1.6rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky; top: 0; z-index: 5;
}
.modal-back {
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.6);
  background: none;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 3px;
  padding: 0.3rem 0.7rem;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
  text-transform: uppercase;
}
.modal-back:hover { color: var(--white); border-color: rgba(255,255,255,0.4); }
.modal-id {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
}
.modal-body { padding: 2rem 2.4rem 2.4rem; }
.modal-title { font-family: var(--display); font-size: clamp(1.4rem, 2.5vw, 2rem); font-weight: 800; color: var(--text); margin-bottom: 0.8rem; }
.modal-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.4rem; }
.modal-tag {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  padding: 0.22rem 0.55rem;
  border-radius: 3px;
  border: 1px solid var(--border);
  color: var(--mid);
  background: var(--bg);
}
.modal-visual {
  width: 100%;
  aspect-ratio: 16/6;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 1.6rem;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.modal-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1.6rem; margin-bottom: 1.4rem; }
.modal-col h4 { font-family: var(--display); font-size: 0.8rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
.modal-col p  { font-size: 0.8rem; color: var(--mid); line-height: 1.65; }
.modal-extra { margin-top: 0.8rem; padding: 1rem 1.2rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; }
.modal-extra h4 { font-family: var(--display); font-size: 0.8rem; font-weight: 700; color: var(--text); margin-bottom: 0.7rem; }
.extra-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.extra-pill {
  font-size: 0.75rem;
  font-family: var(--mono);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 0.3rem 0.7rem;
  color: var(--mid);
  background: var(--white);
}

/* ─── NAV ─── */
#prev-btn, #next-btn {
  position: fixed; top: 50%; z-index: 50;
  transform: translateY(-50%);
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.7);
  font-family: var(--mono); font-size: 1rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s, color 0.2s;
}
#prev-btn:hover, #next-btn:hover { border-color: rgba(255,255,255,0.5); color: white; }
#prev-btn { left: 16px; } #next-btn { right: 16px; }
#prev-btn.hide, #next-btn.hide { opacity: 0; pointer-events: none; }

#dot-nav {
  position: fixed; bottom: 20px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 8px; z-index: 50;
}
.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.25);
  cursor: pointer;
  transition: all 0.3s ease;
}
.dot.active { background: rgba(255,255,255,0.9); width: 20px; border-radius: 3px; }

#slide-counter {
  position: fixed; top: 20px; right: 24px;
  font-family: var(--mono); font-size: 0.65rem;
  color: rgba(255,255,255,0.35); letter-spacing: 0.1em;
  z-index: 50;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  :root { --panel-w: 0px; }
  .left-panel { display: none; }
  .right-panel { padding: 3vh 5vw; }
  h1 { font-size: 1.9rem; }
  h2 { font-size: 1.5rem; }
  .team-grid { grid-template-columns: repeat(2, 1fr); }
  .plans { grid-template-columns: 1fr; }
  .ideas-grid { grid-template-columns: 1fr; }
  .idea-card.wide { grid-column: 1; }
  .ask-grid { grid-template-columns: 1fr; }
  .modal-cols { grid-template-columns: 1fr; }
  .supervision-layout { grid-template-columns: 1fr; }
  .supervision-asks { grid-template-columns: 1fr; }
  .s-row { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div id="deck-shell"></div>

<!-- NAV -->
<button id="prev-btn" aria-label="Previous slide">&#8592;</button>
<button id="next-btn" aria-label="Next slide">&#8594;</button>
<div id="dot-nav"></div>
<div id="slide-counter"></div>

<!-- MODAL OVERLAY -->
<div id="modal-overlay" role="dialog" aria-modal="true" aria-label="Idea detail">
  <div id="modal-box"></div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────

const TEAM = [
  {
    name: 'Omar Hossam',
    major: 'Computer Science', badge: 'badge-cs',
    role: 'AI systems, DevOps, project architecture',
    photo: 'profiles/New folder/1750706771449.jpg',
    github: 'https://github.com/4awmy',
    linkedin: 'https://www.linkedin.com/in/omar-hossam-4awmy/',
    highlight: 'ClassroomX — best-project award',
    highlightLink: 'https://classroomx-lkbxf.ondigitalocean.app/showcase'
  },
  {

// ─── BUILD DECK ─────────────────────────────────────────
const shell = document.getElementById('deck-shell');
const dotNav = document.getElementById('dot-nav');
const counter = document.getElementById('slide-counter');
let current = 0;

SLIDES.forEach((html, i) => {
  const wrapper = document.createElement('div');
  wrapper.innerHTML = html;
  const slide = wrapper.firstElementChild;
  slide.classList.remove('active');
  shell.appendChild(slide);

  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.setAttribute('aria-label', `Slide ${i + 1}`);
  dot.addEventListener('click', () => go(i));
  dotNav.appendChild(dot);
});

const slideEls = document.querySelectorAll('.slide');
const dotEls = document.querySelectorAll('.dot');

function go(i) {
  if (i < 0 || i >= SLIDES.length) return;
  slideEls[current].classList.remove('active');
  dotEls[current].classList.remove('active');
  current = i;
  slideEls[current].classList.add('active');
  dotEls[current].classList.add('active');
  counter.textContent = `${String(current + 1).padStart(2,'0')} / ${String(SLIDES.length).padStart(2,'0')}`;
  document.getElementById('prev-btn').classList.toggle('hide', current === 0);
  document.getElementById('next-btn').classList.toggle('hide', current === SLIDES.length - 1);
}

document.getElementById('prev-btn').addEventListener('click', () => go(current - 1));
document.getElementById('next-btn').addEventListener('click', () => go(current + 1));
document.addEventListener('keydown', e => {
  if (document.getElementById('modal-overlay').classList.contains('open')) {
    if (e.key === 'Escape') closeModal();
    return;
  }
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(current + 1); }
  if (e.key === 'ArrowLeft') go(current - 1);
});

// Keyboard on idea cards
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.classList.contains('idea-card')) e.target.click();
});

go(0);

// ─── MODAL ──────────────────────────────────────────────
const overlay = document.getElementById('modal-overlay');
const modalBox = document.getElementById('modal-box');

function openModal(i) {
  const idea = IDEAS[i];
  const tagColors = { 'tag-ai': '#0891B2', 'tag-hw': '#E55B4D', 'tag-med': '#059669' };
  modalBox.innerHTML = `

      <div class="modal-cols">

          <p>${idea.how}</p>
        </div>
        <div class="modal-col">

          <p>${idea.research}</p>

      <div class="modal-extra">

          ${idea.extra.pills.map(p => `<span class="extra-pill">${p}</span>`).join('')}

}

function closeModal() {

  document.body.style.overflow = '';
}

overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
